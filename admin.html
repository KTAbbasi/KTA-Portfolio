<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTA | Admin Insights</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            cursor: auto !important; 
            overflow: auto !important; 
            background: #0E0505;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        #admin-root { 
            min-height: 100vh; 
            padding: 40px; 
        }
        /* Fix for scrollings and hidden dashboard */
        .admin-view {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="admin-root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh;">
            <p id="mounting-status" style="color: #C9A84C; font-weight: 700; letter-spacing: 2px;">INITIALIZING DASHBOARD...</p>
            <p id="mounting-error" style="color: #ff4444; font-size: 12px; margin-top: 10px; display: none;">Checking connection...</p>
        </div>
    </div>
    
    <script>
        // Global error reporter
        window.onerror = function(message, source, lineno, colno, error) {
            const status = document.getElementById('mounting-status');
            if (status) {
                status.style.color = '#ff4444';
                status.innerText = 'SCRIPT ERROR: ' + message;
            }
            return false;
        };
        window.onunhandledrejection = function(event) {
            const status = document.getElementById('mounting-status');
            if (status) {
                status.style.color = '#ff4444';
                status.innerText = 'PROMISE ERROR: ' + event.reason;
            }
        };

         // Reachability check
        fetch('/admin_dashboard.tsx').then(r => {
            if (!r.ok) {
                const status = document.getElementById('mounting-status');
                if (status) status.innerText = 'DASHBOARD FILE NOT FOUND: ' + r.status;
            }
        }).catch(err => {
             const status = document.getElementById('mounting-status');
             if (status) status.innerText = 'NETWORK ERROR: ' + err.message;
        });

        // Timeout fallback
        setTimeout(() => {
            const status = document.getElementById('mounting-status');
            if (status && (status.innerText === 'INITIALIZING DASHBOARD...' || status.innerText.includes('LOADED'))) {
                const err = document.getElementById('mounting-error');
                if (err) {
                    err.style.display = 'block';
                    err.innerText = 'If this screen stays, please visit Home first. If it persists, there is a mounting error.';
                }
            }
        }, 10000);
    </script>

    <script type="module" src="admin_dashboard.tsx"></script>
</body>
</html>
