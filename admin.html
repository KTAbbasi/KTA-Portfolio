<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTA | Admin Insights</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            cursor: auto !important; 
            overflow: auto !important; 
            background: #0E0505;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        #admin-root { 
            min-height: 100vh; 
            padding: 40px; 
        }
        /* Fix for scrollings and hidden dashboard */
        .admin-view {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="admin-root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh;">
            <p id="mounting-status" style="color: #C9A84C; font-weight: 700; letter-spacing: 2px;">INITIALIZING DASHBOARD...</p>
            <p id="mounting-error" style="color: #ff4444; font-size: 12px; margin-top: 10px; display: none;">Checking connection...</p>
        </div>
    </div>
    
    <script>
        // Diagnostic logger - extremely safe version
        function writeLog(msg, color) {
            var c = color || '#C9A84C';
            var status = document.getElementById('mounting-status');
            if (status) {
                status.innerText = msg;
                status.style.color = c;
            }
            console.log('[Admin Log]: ' + msg);
        }

        window.onerror = function(message, source, lineno) {
            writeLog('LOAD ERROR: ' + message + (lineno ? ' (Line: ' + lineno + ')' : ''), '#ff4444');
            return false;
        };

        window.onunhandledrejection = function(event) {
            var reason = event.reason;
            var msg = (reason && reason.message) ? reason.message : String(reason);
            writeLog('PROMISE ERROR: ' + msg, '#ff4444');
        };

        // Pre-flight check
        writeLog('LOCATING DASHBOARD ENGINE...');
        fetch('js/admin_dashboard.tsx').then(function(r) {
            if (!r.ok) writeLog('ENGINE NOT FOUND (404) at js/admin_dashboard.tsx', '#ff4444');
            else writeLog('ENGINE LOCATED. INITIALIZING REACT...');
        }).catch(function(err) {
            writeLog('NETWORK ERROR: ' + err.message, '#ff4444');
        });

        // Timeout fallback
        setTimeout(function() {
            var status = document.getElementById('mounting-status');
            if (status && status.innerText.indexOf('INITIALIZING') !== -1) {
                writeLog('STILL INITIALIZING... TRY RELOADING.', '#ff4444');
                document.getElementById('mounting-error').style.display = 'block';
                document.getElementById('mounting-error').innerText = 'The engine is taking longer than expected. Please hard refresh (Ctrl+F5).';
            }
        }, 12000);
    </script>

    <script type="module" src="js/admin_dashboard.tsx"></script>
</body>
</html>
