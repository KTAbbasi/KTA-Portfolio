<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTA | Admin Insights</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            cursor: auto !important; 
            overflow: auto !important; 
            background: #0E0505;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        #admin-root { 
            min-height: 100vh; 
            padding: 40px; 
        }
        /* Fix for scrollings and hidden dashboard */
        .admin-view {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="admin-root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh;">
            <p id="mounting-status" style="color: #C9A84C; font-weight: 700; letter-spacing: 2px;">INITIALIZING DASHBOARD...</p>
            <p id="mounting-error" style="color: #ff4444; font-size: 12px; margin-top: 10px; display: none;">Checking connection...</p>
        </div>
    </div>
    
    <script>
        // Diagnostic logger
        function updateStatus(msg, isError = false) {
            const status = document.getElementById('mounting-status');
            if (status) {
                status.innerText = msg;
                if (isError) status.style.color = '#ff4444';
            }
            console.log('Admin Status:', msg);
        }

        window.onerror = function(message) {
            updateStatus('LOAD ERROR: ' + message, true);
        };
        window.onunhandledrejection = function(event) {
            updateStatus('PROMISE ERROR: ' + (event.reason?.message || event.reason), true);
        };

        // Check if script file is even reachable
        updateStatus('CHECKING DASHBOARD BUNDLE...');
        fetch('/js/admin_dashboard.tsx').then(r => {
            if (!r.ok) updateStatus('BUNDLE NOT FOUND (404)', true);
            else updateStatus('BUNDLE FOUND, MOUNTING...');
        }).catch(err => updateStatus('NETWORK ERROR: ' + err.message, true));

        // Fallback for extreme cases
        setTimeout(() => {
            const status = document.getElementById('mounting-status');
            if (status && status.innerText.includes('INITIALIZING')) {
                updateStatus('STUCK DETECTED. PLEASE HARD REFRESH.', true);
            }
        }, 15000);
    </script>

    <script type="module" src="/js/admin_dashboard.tsx"></script>
</body>
</html>
