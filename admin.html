<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTA | Admin Insights</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { 
            cursor: auto !important; 
            overflow: auto !important; 
            background: #0E0505;
            color: white;
            font-family: 'Montserrat', sans-serif;
        }
        #admin-root { 
            min-height: 100vh; 
        }
        /* Fix for scrollings and hidden dashboard */
        .admin-view {
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="admin-root">
        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 80vh;">
            <p id="mounting-status" style="color: #C9A84C; font-weight: 700; letter-spacing: 2px;">INITIALIZING DASHBOARD...</p>
            <p id="mounting-error" style="color: #ff4444; font-size: 12px; margin-top: 10px; display: none;">Checking connection...</p>
        </div>
    </div>
    
    <script>
        // Diagnostic logger - extremely safe version
        function writeLog(msg, color) {
            var c = color || '#C9A84C';
            var status = document.getElementById('mounting-status');
            if (status) {
                status.innerText = msg;
                status.style.color = c;
            }
            console.log('[Admin Log]: ' + msg);
        }

        window.onerror = function(message, source, lineno, colno, error) {
            var errStr = message + (lineno ? ' (Line: ' + lineno + ')' : '');
            if (error && error.stack) {
                console.error('Stack Trace:', error.stack);
            }
            writeLog('LOAD ERROR: ' + errStr, '#ff4444');
            return false;
        };

        window.onunhandledrejection = function(event) {
            var reason = event.reason;
            var msg = (reason && reason.message) ? reason.message : String(reason);
            writeLog('PROMISE ERROR: ' + msg, '#ff4444');
        };

        // Pre-flight check
        writeLog('CONNECTING TO DASHBOARD ENGINE...', '#C9A84C');
        
        // Timeout fallback
        setTimeout(function() {
            var status = document.getElementById('mounting-status');
            // Only fire if we are still at the "waiting" or "fetching" phase
            if (status && (status.innerText.indexOf('CONNECTING') !== -1 || status.innerText.indexOf('FOUND') !== -1)) {
                writeLog('STILL LOADING... TRY HARD REFRESH.', '#ff4444');
                var errBox = document.getElementById('mounting-error');
                if (errBox) {
                    errBox.style.display = 'block';
                    errBox.innerText = 'The dashboard engine is not responding. This might be due to a slow connection or a caching issue. Please hard refresh (Ctrl+F5).';
                }
            }
        }, 8000);
    </script>
    <script type="module" src="js/admin_dashboard.tsx"></script>
    <script>
        // Check if React mounted successfully after 5 seconds
        setTimeout(function() {
            if (!document.getElementById('admin-root').children.length) {
                console.warn('Dashboard mount check failed. Retrying script injection...');
                var s = document.createElement('script');
                s.type = 'module';
                s.src = 'js/admin_dashboard.tsx?v=' + Date.now();
                document.body.appendChild(s);
            }
        }, 5000);
    </script>
</body>
</html>
